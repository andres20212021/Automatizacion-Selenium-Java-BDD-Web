name: Web Automation Tests

on:
  # Se ejecuta cuando se sube un cambio directamente a main
  push:
    branches:
      - main

  # Se ejecuta cuando se crea o actualiza un Pull Request hacia main
  pull_request:
    branches:
      - main

  # Permite ejecutar el pipeline manualmente desde GitHub Actions
  workflow_dispatch:

  # Ejecución programada todos los domingos a las 12:00 del día.
  # Para Chile, revisar diferencia horaria según horario de invierno/verano.
  # Para activar esta ejecución, quitar los comentarios:
  # schedule:
  #   - cron: "0 12 * * 0"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  selenium-tests:
    name: Run Selenium Cucumber Tests
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      # Muestra versiones para diagnóstico
      - name: Show Java, Maven and Chrome versions
        run: |
          java -version
          mvn -version
          google-chrome --version

      # Ejecuta solo las pruebas marcadas con el tag @regression
      - name: Run automated tests
        run: |
          set +e
          xvfb-run -a mvn clean test -Dcucumber.filter.tags="@regression"
          TEST_EXIT_CODE=$?
          echo "TEST_EXIT_CODE=$TEST_EXIT_CODE" >> $GITHUB_ENV
          exit 0

      # Genera el reporte Allure HTML
      # Se ejecuta siempre, aunque alguna prueba falle
      - name: Generate Allure report
        if: always()
        run: |
          mvn allure:report

      # Guarda los resultados crudos de Allure como artifact
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results
          if-no-files-found: warn

      # Guarda el reporte HTML de Allure como artifact descargable
      - name: Upload Allure HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-html-report
          path: target/site/allure-maven-plugin
          if-no-files-found: warn

      # Guarda los reportes de Maven Surefire
      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports
          if-no-files-found: warn

      # Configura GitHub Pages
      - name: Configure GitHub Pages
        if: always()
        uses: actions/configure-pages@v5

      # Sube el reporte Allure generado para publicarlo en GitHub Pages
      - name: Upload Allure report to GitHub Pages
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/site/allure-maven-plugin

      # Publica el reporte Allure en GitHub Pages
      - name: Deploy Allure report to GitHub Pages
        if: always()
        id: deployment
        uses: actions/deploy-pages@v4

      # Muestra en consola la URL del reporte publicado
      - name: Show Allure report URL
        if: always()
        run: |
          echo "Allure report published at:"
          echo "${{ steps.deployment.outputs.page_url }}"

      # Valida el resultado final de las pruebas
      # Si alguna prueba falló, el pipeline queda como failed
      - name: Validate test result
        if: always()
        run: |
          if [ "$TEST_EXIT_CODE" != "0" ]; then
            echo "Las pruebas automatizadas fallaron."
            exit 1
          fi

          echo "Las pruebas automatizadas finalizaron correctamente."
