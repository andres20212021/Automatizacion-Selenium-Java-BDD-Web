name: Web Automation Tests

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

  # Ejecución programada todos los domingos a las 12:00 del día.
  # Para Chile, revisar diferencia horaria según horario de invierno/verano.
  # schedule:
  #   - cron: "0 12 * * 0"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  selenium-tests:
    name: Run Selenium Cucumber Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Show Java, Maven and Chrome versions
        run: |
          java -version
          mvn -version
          google-chrome --version

      - name: Run automated tests
        run: |
          set +e
          xvfb-run -a mvn clean test
          TEST_EXIT_CODE=$?
          echo "TEST_EXIT_CODE=$TEST_EXIT_CODE" >> $GITHUB_ENV
          exit 0

      - name: Generate Allure report
        if: always()
        run: |
          mvn allure:report

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results
          if-no-files-found: warn

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports
          if-no-files-found: warn

      - name: Configure GitHub Pages
        if: always() && github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload Allure report to GitHub Pages
        if: always() && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/site/allure-maven-plugin

      - name: Deploy Allure report to GitHub Pages
        if: always() && github.event_name != 'pull_request'
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Show Allure report URL
        if: always() && github.event_name != 'pull_request'
        run: |
          echo "Allure report published at:"
          echo "${{ steps.deployment.outputs.page_url }}"

      - name: Validate test result
        if: always()
        run: |
          if [ "$TEST_EXIT_CODE" != "0" ]; then
            echo "Las pruebas automatizadas fallaron."
            exit 1
          fi

          echo "Las pruebas automatizadas finalizaron correctamente."
