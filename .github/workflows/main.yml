name: Web Automation Tests

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

  # Ejecución programada todos los domingos a las 12:00 del día.
  # Para Chile, revisar diferencia horaria según horario de invierno/verano.
  
  # schedule:
  #   - cron: "0 12 * * 0"

jobs:
  selenium-tests:
    name: Run Selenium Cucumber Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Show Java and Maven versions
        run: |
          java -version
          mvn -version

      - name: Show Chrome version
        run: |
          google-chrome --version

      - name: Run automated tests
        run: |
          set +e
          xvfb-run -a mvn clean test
          TEST_EXIT_CODE=$?
          echo "TEST_EXIT_CODE=$TEST_EXIT_CODE" >> $GITHUB_ENV
          exit 0

      - name: Generate Allure report
        if: always()
        run: |
          mvn allure:report

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results
          if-no-files-found: warn

      - name: Upload Allure HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-html-report
          path: target/site/allure-maven-plugin
          if-no-files-found: warn

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports
          if-no-files-found: warn

      - name: Validate test result
        if: always()
        run: |
          if [ "$TEST_EXIT_CODE" != "0" ]; then
            echo "Las pruebas automatizadas fallaron."
            exit 1
          fi

          echo "Las pruebas automatizadas finalizaron correctamente."
